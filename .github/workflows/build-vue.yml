name: Build Vue+Electron

on:
  push:
    branches: [ feature/vue-electron ]
    tags: [ 'v-web*' ]
  pull_request:
    branches: [ feature/vue-electron ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: '发布标签（如 v-web1.0.0）'
        required: false
        type: string
      upload_to_release:
        description: '是否上传产物到 Release'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  SERVER_DIR: 'server'
  CLIENT_DIR: 'client'

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('server/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Spring Boot
        run: |
          cd ${{ env.SERVER_DIR }}
          mvn clean package -DskipTests -B

      - name: Upload Server JAR
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: ${{ env.SERVER_DIR }}/target/*.jar

  build-client:
    name: Build Client (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs: build-server
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-2022
            ext: exe
          - os: linux
            runner: ubuntu-22.04
            ext: AppImage
          - os: macos
            runner: macos-14
            ext: dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CLIENT_DIR }}/package-lock.json

      - name: Download Server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: ${{ env.CLIENT_DIR }}/resources/

      - name: Install Dependencies
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm ci

      - name: Build & Package Electron
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Web-${{ matrix.os }}
          path: |
            ${{ env.CLIENT_DIR }}/dist/*.exe
            ${{ env.CLIENT_DIR }}/dist/*.AppImage
            ${{ env.CLIENT_DIR }}/dist/*.dmg
            ${{ env.CLIENT_DIR }}/dist/*.zip
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build-client
    if: ${{ startsWith(github.ref, 'refs/tags/v-web') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release == true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Collect Release Files
        run: |
          mkdir -p ./release
          find ./artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} ./release/ \;

      - name: Determine Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v-web* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v-web0.0.0-dev.$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: ClassIsScore Web ${{ steps.tag.outputs.tag }}
          artifacts: "./release/*"
          draft: false
          prerelease: true
          generateReleaseNotes: true
          allowUpdates: true
          replacesExistingArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
