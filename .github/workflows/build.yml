name: Build Tauri

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 v1.0.0 / v1.1.0-beta.1)'
        required: true
        type: string
      release_type:
        description: 'GitHub Release 类型'
        required: true
        type: choice
        default: 'release'
        options:
          - release
          - prerelease
          - draft

env:
  RUST_VERSION: 1.89.0
  NODE_VERSION: 20

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build
        run: |
          cd client
          npm run tauri:build -- --target universal-apple-darwin
      - name: Zip macOS .app
        run: |
          # .app 是目录，GitHub Release asset 需要文件，所以先压成 zip
          APP_PATH="client/src-tauri/target/universal-apple-darwin/release/bundle/macos/ClassIsScore.app"
          if [ -d "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$(dirname "$APP_PATH")/ClassIsScore-macOS.zip"
            echo "已生成 $(dirname "$APP_PATH")/ClassIsScore-macOS.zip"
          else
            echo "未找到 $APP_PATH"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-macOS
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/macos/ClassIsScore-macOS.zip
          if-no-files-found: warn

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build
        run: |
          cd client
          npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Windows
          path: client/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev patchelf
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build
        run: |
          cd client
          npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Linux
          # 用具体扩展名精确匹配最终 bundle 文件，
          # 不要用 bundle/{deb,rpm,appimage}/*（upload-artifact 不支持 brace
          # 展开），也不要只写 deb/*（会带上 Tauri 的中间构建目录如
          # ClassIsScore.AppDir、ClassIsScore_1.0.5_amd64/）。
          path: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/rpm/*.rpm
            client/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build frontend
        run: |
          cd client
          npm run build
      - name: Init Android project
        run: |
          cd client
          # 首次构建需要先生成 src-tauri/gen/android 目录。
          # --ci 跳过交互式确认，--force 在已存在时覆盖。
          npx tauri android init --ci
      - name: Build Android (aarch64, debug)
        run: |
          cd client
          # Tauri 2.x CLI 的 android build 用 Android ABI 命名空间（aarch64 / armv7 / x86_64），
          # 与 rustup target add 用的 Rust triple（aarch64-linux-android）不同。
          # 加 --debug 走 debug keystore（Android 默认 debug.keystore），
          # 不需要用户自行签名即可产出可安装的 APK。
          npm run tauri:android:build -- --target aarch64 --debug
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Android
          # Tauri 2.x 的 `android build --target aarch64 --debug` 实际产物在
          # apk/universal/debug/ 下面（不是 apk/debug/），用 ** 兜底匹配。
          path: client/src-tauri/gen/android/app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: warn

  release:
    # 仅在手动触发（workflow_dispatch）时执行，把四个平台的构建产物
    # 打成同一个 GitHub Release，类型由 release_type 输入决定
    # (release / prerelease / draft)。
    name: Publish Release
    if: github.event_name == 'workflow_dispatch'
    needs: [build-macos, build-windows, build-linux, build-android]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release

          # upload-artifact 会保留相对路径，所以下载下来后实际结构是：
          #   artifacts/ClassIsScore-Windows/client/src-tauri/target/release/bundle/msi/ClassIsScore.msi
          #   artifacts/ClassIsScore-Linux/client/src-tauri/target/release/bundle/{deb,rpm,appimage}/...
          #   artifacts/ClassIsScore-Android/client/src-tauri/gen/android/app/build/outputs/apk/.../*.apk
          # 这里只挑出最终交付给用户的 bundle 文件：
          #   - 单文件 (.msi / .deb / .rpm / .AppImage / .apk / 已 zip 的 .app) → 直接复制
          #   - 目录（如 .app 漏网之鱼） → 压成 zip
          # 这样 release/ 目录里就只有扁平化的最终文件，
          # softprops/action-gh-release@v2 不会再去递归每个内部目录。
          find artifacts -type f \
              \( -name "*.msi" -o -name "*.deb" -o -name "*.rpm" \
              -o -name "*.AppImage" -o -name "*.apk" -o -name "*.zip" \) \
              -print0 | while IFS= read -r -d '' file; do
            base=$(basename "$file")
            cp "$file" "release/$base"
          done

          # 兜底：如果还遗留了 .app / .AppDir 这类目录（理论上 macOS 已经在
          # 前面压好了，但保险起见再扫一遍），统一打包成 zip。
          find artifacts -type d \
              \( -name "*.app" -o -name "*.AppDir" \) \
              -print0 | while IFS= read -r -d '' dir; do
            base=$(basename "$dir")
            (cd "$(dirname "$dir")" && zip -qr "$OLDPWD/release/${base}.zip" "$base")
          done

          echo "=== release/ 最终内容 ==="
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: ${{ inputs.release_type == 'draft' }}
          prerelease: ${{ inputs.release_type == 'prerelease' }}
          generate_release_notes: true
          # 使用 Prepare release assets 步骤整理好的 release/ 目录，
          # 避免 softprops/action-gh-release@v2 把 .app 目录、
          # .AppImage 里的 AppDir、Tauri 中间构建目录里的每一个文件
          # 都当成 release asset 单独上传，导致同名冲突
          # (Validation Failed: ... "code":"already_exists")。
          files: |
            release/**
