name: Build Tauri

on:
  push:
    branches: [ main, feature/vue-electron ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: '发布标签（如 v1.0.0）'
        required: false
        type: string
      upload_to_release:
        description: '是否上传产物到 Release'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20.x'
  RUST_VERSION: '1.77'
  CLIENT_DIR: 'client'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-2022
          - os: linux
            runner: ubuntu-22.04
          - os: macos
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.CLIENT_DIR }}/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.CLIENT_DIR }}/src-tauri -> target

      - name: Install Linux Dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Frontend Dependencies
        run: |
          cd ${{ env.CLIENT_DIR }}
          npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.CLIENT_DIR }}
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'ClassIsScore ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-${{ matrix.os }}
          path: |
            ${{ env.CLIENT_DIR }}/target/release/bundle/**/*.exe
            ${{ env.CLIENT_DIR }}/target/release/bundle/**/*.msi
            ${{ env.CLIENT_DIR }}/target/release/bundle/**/*.AppImage
            ${{ env.CLIENT_DIR }}/target/release/bundle/**/*.deb
            ${{ env.CLIENT_DIR }}/target/release/bundle/**/*.dmg
            ${{ env.CLIENT_DIR }}/target/release/bundle/**/*.app
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.upload_to_release == true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Collect Release Files
        run: |
          mkdir -p ./release
          find ./artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" \) -exec cp {} ./release/ \;

      - name: Determine Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v0.0.0-dev.$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: ClassIsScore ${{ steps.tag.outputs.tag }}
          artifacts: "./release/*"
          draft: false
          prerelease: true
          generateReleaseNotes: true
          allowUpdates: true
          replacesExistingArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
