name: Build Tauri

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_VERSION: 1.89.0
  NODE_VERSION: 20

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build
        run: |
          cd client
          npm run tauri:build -- --target universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-macOS
          path: client/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build
        run: |
          cd client
          npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Windows
          path: client/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev patchelf
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build
        run: |
          cd client
          npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Linux
          path: client/src-tauri/target/release/bundle/{deb,rpm,appimage}/*
          if-no-files-found: warn

  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Build frontend
        run: |
          cd client
          npm run build
      - name: Init Android project
        run: |
          cd client
          # 首次构建需要先生成 src-tauri/gen/android 目录。
          # --ci 跳过交互式确认，--force 在已存在时覆盖。
          npx tauri android init --ci
      - name: Build Android (aarch64, debug)
        run: |
          cd client
          # Tauri 2.x CLI 的 android build 用 Android ABI 命名空间（aarch64 / armv7 / x86_64），
          # 与 rustup target add 用的 Rust triple（aarch64-linux-android）不同。
          # 加 --debug 走 debug keystore（Android 默认 debug.keystore），
          # 不需要用户自行签名即可产出可安装的 APK。
          npm run tauri:android:build -- --target aarch64 --debug
      - uses: actions/upload-artifact@v4
        with:
          name: ClassIsScore-Android
          path: client/src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
